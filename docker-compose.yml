services:
  atlas:
    build: .
    image: atlas-a2a:latest
    container_name: atlas
    ports:
      - "8000:8000"
    environment:
      ATLAS_SEED: "42"
      # Multi-org federation: number of sealed 100-agent orgs (1 = single-org demo). Works with
      # the bundled Postgres — each org is namespaced in the shared DB, so >1 needs no other
      # change. The cross-org AUTO-FALLBACK trigger requires the DB (it is membership-gated), so
      # with >1 use the UI's Network → Join all on each org to populate membership.
      ATLAS_ORG_COUNT: "${ATLAS_ORG_COUNT:-1}"
      ATLAS_CRON_GOAL_SECONDS: "${ATLAS_CRON_GOAL_SECONDS:-30}"
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # REQUIRED: Atlas runs real Mistral via Amazon Bedrock (user prompts AND cron)
      # — NO simulated fallback. Put your Bedrock API key (or AWS creds) in a .env
      # next to this file; without it the container starts then exits with a clear error.
      AWS_BEARER_TOKEN_BEDROCK: ${AWS_BEARER_TOKEN_BEDROCK:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      # Edge auth (opt-in): set ATLAS_API_KEY in .env to gate /api/* (401/403). Unset = open.
      ATLAS_API_KEY: ${ATLAS_API_KEY:-}
      # Model ids — set these in .env to a foundation-model id OR an inference-profile ARN.
      ATLAS_BEDROCK_REASONING_MODEL: "${ATLAS_BEDROCK_REASONING_MODEL:-mistral.mistral-large-2402-v1:0}"
      ATLAS_BEDROCK_PHRASING_MODEL: "${ATLAS_BEDROCK_PHRASING_MODEL:-mistral.mistral-large-2402-v1:0}"
      # Throttling — lower these in .env if your Bedrock quota is tight (429s).
      ATLAS_BEDROCK_RPM: "${ATLAS_BEDROCK_RPM:-22}"
      ATLAS_BEDROCK_BURST: "${ATLAS_BEDROCK_BURST:-5}"
      # Persistence + authenticated network. HARDCODED to the bundled `postgres` service (NOT read
      # from .env) so a `@localhost` ATLAS_DATABASE_URL in .env — correct for a local `uv run`, but
      # wrong inside a container, where localhost is the app itself (no DB there) — can't break the
      # Docker stack. To point Atlas at an external Postgres, edit this line.
      ATLAS_DATABASE_URL: "postgresql+asyncpg://atlas:atlas@postgres:5432/atlas"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 3s
      retries: 12
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    restart: "no"

volumes:
  atlas_pgdata:
